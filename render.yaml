{
  "buildCommand": "pip install -r requirements.txt && cd frontend && npm install && npm run build",
  "startCommand": "python server.py",
  "envVars": [
    {
      "key": "CORS_ORIGINS",
      "value": "*"
    },
    {
      "key": "PYTHON_VERSION",
      "value": "3.11.9"
    },
    {
      "key": "NODE_VERSION",
      "value": "20.0.0"
    }
  ]
}
