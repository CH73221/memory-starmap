<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆星图 - AI 智能复习引擎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <style>
      /* 内联加载画面 — 在 React 挂载前立即可见，React 挂载后自动替换 */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0f 0%, #12121f 40%, #0d0d18 70%, #08080f 100%);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #initial-loader .loader-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 28px;
      }
      #initial-loader .loader-brand svg {
        width: 28px;
        height: 28px;
        animation: loader-pulse 2s ease-in-out infinite;
      }
      #initial-loader .loader-brand span {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.9);
      }
      #initial-loader .loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: rgba(203, 141, 255, 0.8);
        border-radius: 50%;
        animation: loader-spin 0.8s linear infinite;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes loader-pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="loader-brand">
          <svg viewBox="0 0 32 32" fill="white">
            <path d="M16 4 C19 9 22 11 27 12 C22 13 19 15 16 20 C13 15 10 13 5 12 C10 11 13 9 16 4 Z" />
            <circle cx="16" cy="16" r="1.5" />
            <path d="M16 22 C18 25 19 27 19 28 C17 27 15 26 14 25 C14.5 24 15 23 16 22 Z" />
          </svg>
          <span>记忆星图</span>
        </div>
        <div class="loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
